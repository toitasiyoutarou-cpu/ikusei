<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#786fa6">
  <title>CHEM GROW｜高校化学 学習育成アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <button class="brand" data-action="home" aria-label="ホームへ">
        <span class="brand-mark">⚗</span>
        <span><strong>CHEM GROW</strong><small>校内版・端末内セーブ</small></span>
      </button>
      <nav class="topnav" aria-label="メインメニュー">
        <button data-route="home">ホーム</button>
        <button data-route="units">単元</button>
        <button data-route="status">ステータス</button>
        <button data-route="records">学習記録</button>
        <button data-route="retry">誤答ラボ</button>
        <button data-route="settings">設定</button>
      </nav>
    </header>
    <main id="main" tabindex="-1"></main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="modal" class="modal" aria-hidden="true"></div>

  <script src="data/units.js"></script>
  <script src="data/characters.js"></script>
  <script src="data/questions.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
